name: E2E Tests (Project_04 V2)

# The V2 test-plan project lives at Project_04_Test_Plan_Creator_Agent_V2/.
# This workflow only triggers when something inside that folder (or this
# workflow file) changes — so unrelated commits to other folders in the repo
# (e.g. RAG Implementation/) don't burn runner minutes here.
on:
  push:
    branches: [main]
    paths:
      - 'Project_04_Test_Plan_Creator_Agent_V2/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Project_04_Test_Plan_Creator_Agent_V2/**'
      - '.github/workflows/e2e-tests.yml'
  # Nightly regression at 02:00 UTC (07:30 IST). Adjust to your team's timezone.
  schedule:
    - cron: '0 2 * * *'
  # Manual trigger from the GitHub Actions tab OR the in-app CI/CD dashboard
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'ad-hoc'

# Cancel any in-flight run on the same branch when a new push arrives —
# saves runner minutes on rapid iteration.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# All steps run inside Project_04_Test_Plan_Creator_Agent_V2/ by default.
# setup-node still inspects package-lock.json paths globally — that's fine.
defaults:
  run:
    working-directory: Project_04_Test_Plan_Creator_Agent_V2

jobs:
  typecheck:
    name: Type-check (frontend + backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Project_04_Test_Plan_Creator_Agent_V2/package-lock.json
            Project_04_Test_Plan_Creator_Agent_V2/backend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Install backend deps
        working-directory: Project_04_Test_Plan_Creator_Agent_V2/backend
        run: npm ci

      - name: Type-check backend
        working-directory: Project_04_Test_Plan_Creator_Agent_V2/backend
        run: npx tsc --noEmit

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Project_04_Test_Plan_Creator_Agent_V2/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Project_04_Test_Plan_Creator_Agent_V2/dist
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 30
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Project_04_Test_Plan_Creator_Agent_V2/package-lock.json
            Project_04_Test_Plan_Creator_Agent_V2/backend/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        working-directory: Project_04_Test_Plan_Creator_Agent_V2/backend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Start the backend in the background so tests that hit /api/* work.
      # Polls /api/health up to 30 times (1s each) until the server responds.
      - name: Start backend
        run: |
          (cd backend && npx tsx server.ts) &
          echo "$!" > backend.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Backend ready after $i attempts"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Run Playwright tests
        # If no spec files exist under tests/ yet, surface that as a skipped job
        # rather than a hard failure — the project ships UI-generated tests.
        run: |
          if find tests -name "*.spec.ts" -o -name "*.spec.js" 2>/dev/null | grep -q .; then
            npx playwright test
          else
            echo "::warning::No Playwright test files found in tests/ — skipping run"
          fi

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Project_04_Test_Plan_Creator_Agent_V2/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test results (screenshots, videos, traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Project_04_Test_Plan_Creator_Agent_V2/test-results
          retention-days: 14
          if-no-files-found: ignore
